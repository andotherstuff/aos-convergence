name = "aos-convergence-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# APPROVALS KV stores approved npubs as keys: approved:<npub>
[[kv_namespaces]]
binding = "APPROVALS"
id = "31335330ba504ed98ad3748598da9454"

# Secrets:
# - ADMIN_PUBKEYS: comma-separated admin pubkeys allowed to manage approvals (npub or hex)
# - SIGNAL_GROUP_LINK: event coordination link returned to approved attendees
# - APPROVED_NPUBS: optional legacy fallback list (comma-separated npubs)
#
# Set them with:
#   wrangler secret put ADMIN_PUBKEYS
#   wrangler secret put SIGNAL_GROUP_LINK
#   wrangler secret put APPROVED_NPUBS
